<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoSense — AI Tahlil</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a40;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #ffaa00;
    --text: #e8e8f0;
    --muted: #666680;
    --gold: #ffd700;
  }
  [data-theme="light"] {
    --bg: #f0f0f8;
    --surface: #ffffff;
    --card: #f8f8ff;
    --border: #ddddf0;
    --text: #1a1a2e;
    --muted: #8888aa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: all 0.3s;
  }
  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(20px);
  }
  .logo {
    font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), #00aaff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-controls { display: flex; gap: 10px; align-items: center; }
  .lang-btn, .theme-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 20px;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .lang-btn:hover, .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

  /* CRYPTO SELECTOR */
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
  }
  .crypto-grid {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
  }
  .crypto-chip {
    background: var(--card); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 20px; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .crypto-chip:hover { border-color: var(--accent); transform: translateY(-1px); }
  .crypto-chip.selected { background: var(--accent); color: #000; border-color: var(--accent); }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.6; }

  /* ANALYZE BUTTON */
  .analyze-btn {
    width: 100%; padding: 16px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #00aaff);
    border: none; color: #000; font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 800; cursor: pointer;
    transition: all 0.2s; margin-bottom: 24px;
    letter-spacing: 0.5px;
  }
  .analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,255,136,0.3); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* NEWS CARDS */
  .news-container { display: flex; flex-direction: column; gap: 16px; }
  .news-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    animation: slideIn 0.4s ease forwards;
    opacity: 0; transform: translateY(20px);
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .news-card:nth-child(1) { animation-delay: 0.1s; }
  .news-card:nth-child(2) { animation-delay: 0.2s; }
  .news-card:nth-child(3) { animation-delay: 0.3s; }
  .news-card:nth-child(4) { animation-delay: 0.4s; }
  .news-card:nth-child(5) { animation-delay: 0.5s; }

  .card-header {
    padding: 16px; display: flex; align-items: center;
    gap: 12px; border-bottom: 1px solid var(--border);
  }
  .coin-badge {
    background: var(--accent); color: #000;
    padding: 4px 10px; border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .coin-badge.negative { background: var(--accent2); color: #fff; }
  .coin-badge.neutral { background: var(--accent3); color: #000; }
  .news-title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
  .importance {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 6px; flex-shrink: 0;
  }
  .importance.high { background: rgba(255,51,102,0.2); color: var(--accent2); }
  .importance.medium { background: rgba(255,170,0,0.2); color: var(--accent3); }
  .importance.low { background: rgba(0,255,136,0.2); color: var(--accent); }

  .card-body { padding: 16px; }
  .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  @media(max-width: 500px) { .analysis-grid { grid-template-columns: 1fr; } }

  .analysis-box {
    border-radius: 10px; padding: 12px;
  }
  .analysis-box.good { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); }
  .analysis-box.bad { background: rgba(255,51,102,0.08); border: 1px solid rgba(255,51,102,0.2); }
  .analysis-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .analysis-box.good .analysis-label { color: var(--accent); }
  .analysis-box.bad .analysis-label { color: var(--accent2); }
  .analysis-points { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .analysis-points li {
    font-size: 12px; line-height: 1.5; color: var(--text);
    padding-left: 16px; position: relative;
  }
  .analysis-box.good .analysis-points li::before { content: "✓"; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
  .analysis-box.bad .analysis-points li::before { content: "✗"; position: absolute; left: 0; color: var(--accent2); font-weight: 700; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 12px; border-top: 1px solid var(--border);
    flex-wrap: wrap; gap: 8px;
  }
  .verdict {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 6px 14px; border-radius: 20px; text-transform: uppercase;
  }
  .verdict.bullish { background: rgba(0,255,136,0.15); color: var(--accent); border: 1px solid rgba(0,255,136,0.3); }
  .verdict.bearish { background: rgba(255,51,102,0.15); color: var(--accent2); border: 1px solid rgba(255,51,102,0.3); }
  .verdict.neutral { background: rgba(255,170,0,0.15); color: var(--accent3); border: 1px solid rgba(255,170,0,0.3); }
  .decision-note {
    font-size: 11px; color: var(--muted); font-style: italic;
  }

  /* LOADING */
  .loading {
    text-align: center; padding: 40px 20px;
    display: none;
  }
  .loading.active { display: block; }
  .loading-spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty-desc { font-size: 13px; line-height: 1.6; }

  /* ERROR */
  .error-card {
    background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.3);
    border-radius: 12px; padding: 16px; color: var(--accent2);
    font-size: 13px; text-align: center;
  }

  /* SELECT ALL */
  .select-controls { display: flex; gap: 8px; margin-bottom: 10px; }
  .select-all-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 4px 10px; border-radius: 10px;
    font-size: 11px; cursor: pointer; font-family: 'Syne', sans-serif;
    transition: all 0.2s;
  }
  .select-all-btn:hover { border-color: var(--accent); color: var(--accent); }

  .source-tag {
    font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">⬡ CryptoSense</div>
  <div class="header-controls">
    <button class="lang-btn active" onclick="setLang('uz')" id="btn-uz">UZ</button>
    <button class="lang-btn" onclick="setLang('ru')" id="btn-ru">RU</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle">🌙</button>
  </div>
</header>

<main>
  <div class="section-title" id="label-select">Kriptolarni tanlang</div>

  <div class="select-controls">
    <button class="select-all-btn" onclick="selectAll()" id="btn-select-all">Hammasini tanlash</button>
    <button class="select-all-btn" onclick="clearAll()" id="btn-clear-all">Tozalash</button>
  </div>

  <div class="crypto-grid" id="crypto-grid"></div>

  <button class="analyze-btn" onclick="analyze()" id="analyze-btn">
    <span id="analyze-label">🔍 Tahlil qilish</span>
  </button>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">Yangiliklar tahlil qilinmoqda...</div>
  </div>

  <div class="news-container" id="news-container">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title" id="empty-title">Kripto tanlang va tahlil bosing</div>
      <div class="empty-desc" id="empty-desc">AI sizning tanlagan kriptolaringiz bo'yicha yangiliklar topib, yaxshi va yomon tomonlarini tushuntiradi</div>
    </div>
  </div>
</main>

<script>
const CRYPTOS = [
  'BTC','ETH','BNB','SOL','XRP',
  'ADA','AVAX','DOT','LINK','LTC',
  'UNI','ATOM','NEAR','FIL','ALGO'
];

let selected = new Set(['BTC','ETH']);
let currentLang = 'uz';
let isDark = true;

const LANGS = {
  uz: {
    labelSelect: 'Kriptolarni tanlang',
    selectAll: 'Hammasini tanlash',
    clearAll: 'Tozalash',
    analyzeBtn: '🔍 Tahlil qilish',
    loadingText: 'Yangiliklar tahlil qilinmoqda...',
    emptyTitle: 'Kripto tanlang va tahlil bosing',
    emptyDesc: 'AI sizning tanlagan kriptolaringiz bo\'yicha yangiliklar topib, yaxshi va yomon tomonlarini tushuntiradi',
    goodLabel: 'YAXSHI SABABLAR',
    badLabel: 'YOMON SABABLAR',
    decisionNote: '👆 Qaror sizga bog\'liq',
    importance: { high: 'MUHIM', medium: "O'RTA", low: 'PAST' },
    verdict: { bullish: '📈 O\'SISH KUTILADI', bearish: '📉 TUSHISH XAVFI', neutral: '➡️ NEYTRAL' },
    selectFirst: 'Kamida 1 ta kripto tanlang!',
    errorMsg: 'Xatolik yuz berdi. Qayta urinib ko\'ring.'
  },
  ru: {
    labelSelect: 'Выберите криптовалюты',
    selectAll: 'Выбрать все',
    clearAll: 'Очистить',
    analyzeBtn: '🔍 Анализировать',
    loadingText: 'Анализируем новости...',
    emptyTitle: 'Выберите крипто и нажмите анализ',
    emptyDesc: 'ИИ найдёт новости по выбранным криптовалютам и объяснит плюсы и минусы',
    goodLabel: 'ХОРОШИЕ ПРИЧИНЫ',
    badLabel: 'ПЛОХИЕ ПРИЧИНЫ',
    decisionNote: '👆 Решение за вами',
    importance: { high: 'ВАЖНО', medium: 'СРЕДНЕЕ', low: 'НИЗКОЕ' },
    verdict: { bullish: '📈 ОЖИДАЕТСЯ РОСТ', bearish: '📉 РИСК ПАДЕНИЯ', neutral: '➡️ НЕЙТРАЛЬНО' },
    selectFirst: 'Выберите хотя бы 1 криптовалюту!',
    errorMsg: 'Произошла ошибка. Попробуйте снова.'
  },
  en: {
    labelSelect: 'Select cryptocurrencies',
    selectAll: 'Select all',
    clearAll: 'Clear',
    analyzeBtn: '🔍 Analyze',
    loadingText: 'Analyzing news...',
    emptyTitle: 'Select crypto and click analyze',
    emptyDesc: 'AI will find news for your selected cryptos and explain the pros and cons',
    goodLabel: 'POSITIVE REASONS',
    badLabel: 'NEGATIVE REASONS',
    decisionNote: '👆 Decision is yours',
    importance: { high: 'HIGH', medium: 'MEDIUM', low: 'LOW' },
    verdict: { bullish: '📈 BULLISH SIGNAL', bearish: '📉 BEARISH RISK', neutral: '➡️ NEUTRAL' },
    selectFirst: 'Select at least 1 crypto!',
    errorMsg: 'An error occurred. Please try again.'
  }
};

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + lang).classList.add('active');
  updateUI();
}

function updateUI() {
  const L = LANGS[currentLang];
  document.getElementById('label-select').textContent = L.labelSelect;
  document.getElementById('btn-select-all').textContent = L.selectAll;
  document.getElementById('btn-clear-all').textContent = L.clearAll;
  document.getElementById('analyze-label').textContent = L.analyzeBtn;
  document.getElementById('loading-text').textContent = L.loadingText;
  document.getElementById('empty-title').textContent = L.emptyTitle;
  document.getElementById('empty-desc').textContent = L.emptyDesc;
}

function toggleTheme() {
  isDark = !isDark;
  document.body.setAttribute('data-theme', isDark ? '' : 'light');
  document.getElementById('theme-toggle').textContent = isDark ? '🌙' : '☀️';
}

function renderChips() {
  const grid = document.getElementById('crypto-grid');
  grid.innerHTML = CRYPTOS.map(c => `
    <div class="crypto-chip ${selected.has(c) ? 'selected' : ''}" onclick="toggleCrypto('${c}')">
      <span class="chip-dot"></span>${c}
    </div>
  `).join('');
}

function toggleCrypto(coin) {
  if (selected.has(coin)) selected.delete(coin);
  else selected.add(coin);
  renderChips();
}

function selectAll() { CRYPTOS.forEach(c => selected.add(c)); renderChips(); }
function clearAll() { selected.clear(); renderChips(); }

async function analyze() {
  if (selected.size === 0) {
    alert(LANGS[currentLang].selectFirst);
    return;
  }

  const btn = document.getElementById('analyze-btn');
  const loading = document.getElementById('loading');
  const container = document.getElementById('news-container');
  const L = LANGS[currentLang];

  btn.disabled = true;
  loading.classList.add('active');
  container.innerHTML = '';

  const coins = [...selected].join(', ');
  const langInstructions = {
    uz: "O'zbek tilida javob ber",
    ru: "Отвечай на русском языке",
    en: "Respond in English"
  };

  const prompt = `Sen kripto yangiliklar tahlilchisisisan. ${langInstructions[currentLang]}.

Quyidagi kriptovalyutalar uchun so'nggi muhim yangiliklar va bozor tahlilini ber: ${coins}

Har bir kripto uchun JSON formatida quyidagini qaytar:
[
  {
    "coin": "BTC",
    "news_title": "Yangilik sarlavhasi",
    "importance": "high|medium|low",
    "good_reasons": ["sabab 1", "sabab 2", "sabab 3"],
    "bad_reasons": ["sabab 1", "sabab 2", "sabab 3"],
    "verdict": "bullish|bearish|neutral",
    "source": "Manba nomi"
  }
]

Faqat JSON qaytargin, boshqa hech narsa yozma. Har bir kripto uchun alohida ob'ekt yaratgin. Real va aniq ma'lumot ber.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const fullText = data.content.map(i => i.text || "").filter(Boolean).join("\n");

    let cleaned = fullText.replace(/```json|```/g, "").trim();
    const startIdx = cleaned.indexOf('[');
    const endIdx = cleaned.lastIndexOf(']');
    if (startIdx !== -1 && endIdx !== -1) {
      cleaned = cleaned.substring(startIdx, endIdx + 1);
    }

    const newsData = JSON.parse(cleaned);
    loading.classList.remove('active');
    renderNews(newsData, L);

  } catch (err) {
    loading.classList.remove('active');
    container.innerHTML = `<div class="error-card">${L.errorMsg}<br><small>${err.message}</small></div>`;
  }

  btn.disabled = false;
}

function renderNews(newsData, L) {
  const container = document.getElementById('news-container');
  container.innerHTML = newsData.map((item, i) => {
    const badgeClass = item.verdict === 'bullish' ? '' : item.verdict === 'bearish' ? 'negative' : 'neutral';
    const impClass = item.importance === 'high' ? 'high' : item.importance === 'medium' ? 'medium' : 'low';
    const verdictClass = item.verdict;
    const verdictText = L.verdict[item.verdict] || item.verdict;
    const impText = L.importance[item.importance] || item.importance;

    const goodPoints = (item.good_reasons || []).map(r => `<li>${r}</li>`).join('');
    const badPoints = (item.bad_reasons || []).map(r => `<li>${r}</li>`).join('');

    return `
      <div class="news-card" style="animation-delay:${i * 0.1}s">
        <div class="card-header">
          <span class="coin-badge ${badgeClass}">${item.coin}</span>
          <span class="news-title">${item.news_title}</span>
          <span class="importance ${impClass}">${impText}</span>
        </div>
        <div class="card-body">
          <div class="analysis-grid">
            <div class="analysis-box good">
              <div class="analysis-label">${L.goodLabel}</div>
              <ul class="analysis-points">${goodPoints}</ul>
            </div>
            <div class="analysis-box bad">
              <div class="analysis-label">${L.badLabel}</div>
              <ul class="analysis-points">${badPoints}</ul>
            </div>
          </div>
          <div class="card-footer">
            <span class="verdict ${verdictClass}">${verdictText}</span>
            <span class="decision-note">${L.decisionNote}</span>
            <span class="source-tag">📰 ${item.source || 'AI Tahlil'}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// Init
renderChips();
updateUI();
</script>
</body>
</html>
